<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6">
    <div class="text-center max-w-sm animate-fadeIn">
        <!-- Luxury Header -->
        <div class="mb-12">
            <h1 class="text-5xl font-light mb-2 text-gold animate-slideInDown">Soc Ops</h1>
            <div class="h-1 w-16 bg-gradient-to-r from-gold to-transparent mx-auto mb-4 rounded-full"></div>
            <p class="text-lg text-gray-600 font-light tracking-widest uppercase">Social Bingo</p>
        </div>

        <!-- Premium Info Card -->
        <div class="bg-glass rounded-xl p-8 shadow-premium mb-8 border border-gold/30 hover-gold transition-all duration-300 animate-fadeIn stagger-1">
            <h2 class="font-semibold text-gold mb-4 text-lg">How to Play</h2>
            <div class="space-y-3">
                <p class="text-left text-gray-700 text-sm flex items-start">
                    <span class="text-gold mr-3 font-bold">01</span>
                    <span>Find people who match the questions</span>
                </p>
                <p class="text-left text-gray-700 text-sm flex items-start">
                    <span class="text-gold mr-3 font-bold">02</span>
                    <span>Tap a square when you find a match</span>
                </p>
                <p class="text-left text-gray-700 text-sm flex items-start">
                    <span class="text-gold mr-3 font-bold">03</span>
                    <span>Get 5 in a row to win!</span>
                </p>
            </div>
        </div>

        <!-- Premium Button -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-gold text-dark-navy font-bold py-4 px-8 rounded-lg text-lg hover-lift shadow-premium border border-gold transition-all duration-300 animate-fadeIn stagger-2 hover:shadow-premium active:scale-95">
            Start Game
        </button>
    </div>
</div>
</div>

<div id="game-container">
<div class="flex flex-col min-h-full">
    <!-- Premium Header -->
    <header class="flex items-center justify-between p-4 bg-glass-dark border-b border-gold/20 shadow-premium">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-gold text-sm px-3 py-1.5 rounded transition-all duration-300 hover:bg-glass-light border border-transparent hover:border-gold/50">
            ← Back
        </button>
        <h1 class="font-light text-2xl text-gold tracking-widest">SOC OPS</h1>
        <div class="w-16"></div>
    </header>

    <!-- Premium Instructions -->
    <p class="text-center text-gray-600 text-sm py-3 px-4 font-light">
        ✨ Tap a square when you find someone who matches
    </p>

    <!-- Bingo Indicator -->
    {% if session.has_bingo %}
    <div class="bg-gradient-to-r from-gold/20 to-transparent text-gold text-center py-2 font-semibold text-sm border-b border-gold/30">
        🏆 BINGO! You got a line!
    </div>
    {% endif %}

    <!-- Board Container -->
    <div class="flex-1 flex items-center justify-center p-4">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>

<div class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-1 text-center rounded-lg transition-all duration-300 select-none min-h-[60px] text-xs leading-tight font-medium
        {%- if square.is_marked %}
            {%- if is_winning %} bg-gold text-dark-navy border-2 border-gold shadow-premium animate-glow
            {%- else %} bg-glass border border-gold/50 text-gold
            {%- endif %}
        {%- else %} bg-glass border border-glass-border text-gray-700 hover-lift hover:border-gold/50
        {%- endif %}
        {%- if square.is_free_space %} font-bold text-sm text-gold{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-0.5 right-0.5 text-gold text-lg">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
